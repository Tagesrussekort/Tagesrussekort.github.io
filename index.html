<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gratulerer med 17. mai 🇳🇴</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #d40000, #ff2b2b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .container {
      z-index: 2;
      padding: 40px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      max-width: 600px;
      animation: fadeIn 1.2s ease;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .flag {
      font-size: 4rem;
      margin-bottom: 20px;
      animation: wave 2s infinite ease-in-out;
    }

    .countdown {
      margin-top: 20px;
      font-size: 1rem;
      opacity: 0.9;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      opacity: 0.7;
      animation: fall linear infinite;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes wave {
      0%, 100% {
        transform: rotate(0deg);
      }
      50% {
        transform: rotate(10deg);
      }
    }

    @keyframes fall {
      from {
        transform: translateY(-100vh) rotate(0deg);
      }
      to {
        transform: translateY(100vh) rotate(360deg);
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1rem;
      }

      .container {
        margin: 20px;
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="flag">🇳🇴</div>
    <h1>Gratulerer med 17. mai!</h1>
    <p>
      Takk for at du scannet russekortet mitt ❤️<br>
      Du blir sendt videre om noen sekunder...
    </p>
    <div class="countdown" id="countdown"></div>
  </div>

  <script>
    // LEGG INN FORMS-LENKEN DIN HER
    const redirectUrl = "https://forms.gle/gpzMbaAhwtxKYN7k9";

    // Nedtelling
    let seconds = 4;
    const countdown = document.getElementById("countdown");

    countdown.innerText = `Sender deg videre om ${seconds} sekunder...`;

    const interval = setInterval(() => {
      seconds--;
      countdown.innerText = `Sender deg videre om ${seconds} sekunder...`;

      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = redirectUrl;
      }
    }, 1000);

    // Konfetti
    for (let i = 0; i < 80; i++) {
      const confetti = document.createElement("div");
      confetti.classList.add("confetti");

      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
      confetti.style.opacity = Math.random();
      confetti.style.background = ["#ffffff", "#00205b", "#ef2b2d"][Math.floor(Math.random() * 3)];

      document.body.appendChild(confetti);
    }
  </script>

</body>
</html>
